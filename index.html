<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<title>무한 스도쿠</title>
<meta name="theme-color" content="#0e0e18"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="무한 스도쿠"/>
<meta name="description" content="무한 랜덤 스도쿠 — 쉬움·보통·어려움"/>
<meta property="og:title" content="무한 스도쿠"/>
<meta property="og:description" content="무한 랜덤 스도쿠 퍼즐 게임"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;600;700;900&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet"/>
<style>
/* ── Reset & Base ── */
*{box-sizing:border-box;margin:0;padding:0;}
html{height:100%;background:#0e0e18;}
body{
  min-height:100vh;
  background:linear-gradient(160deg,#0e0e18 0%,#13131f 55%,#0e0e18 100%);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:12px 16px;font-family:'Noto Sans KR',sans-serif;overflow-y:auto;
}

/* ── Layout scale: 보드 크기를 화면에 맞게 자동 계산 ── */
:root{
  --board: min(calc(100vw - 32px), calc(100vh - 220px));
  --cell:  calc(var(--board) / 9);
  --font:  calc(var(--cell) * 0.58);
}

/* ── Title ── */
#title-main{
  font-size:22px;font-weight:900;color:#f0e6d3;
  letter-spacing:.08em;text-align:center;margin-bottom:2px;
}
#title-sub{
  font-family:'IBM Plex Mono',monospace;font-size:10px;
  color:rgba(200,169,110,.5);letter-spacing:.22em;text-align:center;margin-bottom:10px;
}

/* ── Stats bar ── */
#stats{display:flex;gap:20px;align-items:center;margin-bottom:10px;}
.stat{text-align:center;}
.stat-val{font-family:'IBM Plex Mono',monospace;font-size:17px;color:#c8a96e;}
.stat-val.err{color:#e05c5c;}
.stat-val.lbl{font-family:'Noto Sans KR',sans-serif;font-size:14px;font-weight:700;}
.stat-sep{width:1px;height:26px;background:rgba(255,255,255,.1);}
.stat-sub{font-size:10px;color:rgba(255,255,255,.28);margin-top:1px;}

/* ── Difficulty selector ── */
#diff-row{display:flex;gap:8px;margin-bottom:10px;}
.diff-btn{
  padding:5px 14px;border-radius:20px;
  border:1px solid rgba(255,255,255,.14);
  background:transparent;color:rgba(255,255,255,.45);
  font-size:13px;font-family:'Noto Sans KR',sans-serif;font-weight:600;
  cursor:pointer;transition:all .2s;-webkit-tap-highlight-color:transparent;
}
.diff-btn.active{background:#c8a96e;color:#0f0f14;border-color:#c8a96e;}
.diff-btn:hover:not(.active){border-color:rgba(200,169,110,.5);color:rgba(200,169,110,.8);}

/* ── Board ── */
#board{
  display:grid;
  grid-template-columns:repeat(9,var(--cell));
  width:calc(var(--board) + 4px);
  border:2px solid rgba(200,169,110,.45);
  border-radius:4px;overflow:hidden;
  box-shadow:0 0 40px rgba(200,169,110,.07);
  margin-bottom:10px;
}
.cell{
  width:var(--cell);height:var(--cell);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;
  font-family:'Noto Sans KR',sans-serif;font-size:var(--font);font-weight:700;
  border-right:1px solid rgba(255,255,255,.07);
  border-bottom:1px solid rgba(255,255,255,.07);
  transition:background .12s,color .12s;
  position:relative;user-select:none;-webkit-tap-highlight-color:transparent;
  background:rgba(255,255,255,.012);color:transparent;
}
/* 3×3 박스 경계선 */
.cell.br{border-right:2px solid rgba(200,169,110,.38);}
.cell.bb{border-bottom:2px solid rgba(200,169,110,.38);}

/* 숫자 색상 */
.cell.given   {color:#f0e6d3;}
.cell.user-ok {color:#c8a96e;}
.cell.user-err{color:#e05c5c!important;}

/* 하이라이트: 선택 셀 */
.cell.hl-sel  {background:#c8a96e!important;color:#0f0f14!important;}
/* 하이라이트: 같은 숫자 */
.cell.hl-same {background:rgba(200,169,110,.22)!important;}
/* 하이라이트: 같은 행·열 */
.cell.hl-line {background:rgba(255,255,255,.055)!important;}
/* 하이라이트: 같은 3×3 박스 */
.cell.hl-box  {background:rgba(255,255,255,.03)!important;}
.cell:hover:not(.hl-sel){background:rgba(200,169,110,.12)!important;}

/* 줄/박스 완성 깜빡임은 JS로 직접 제어 */

/* ── 오답 흔들림: JS Web Animations API로 직접 제어 ── */

/* ── 메모 숫자 (3×3 격자) ── */
.notes{display:grid;grid-template-columns:repeat(3,1fr);width:100%;height:100%;}
.notes span{
  display:flex;align-items:center;justify-content:center;
  font-size:calc(var(--cell)*0.28);color:#a0c4ff;
  font-family:'Noto Sans KR',sans-serif;opacity:1;font-weight:900;
  line-height:1;
}
/* 선택된 셀(골드 배경)에서는 메모 숫자를 어두운 색으로 */
.cell.hl-sel .notes span{color:#1a1a2e;opacity:1;}
/* 같은 숫자·줄·박스 하이라이트에서는 밝게 유지 */
.cell.hl-same .notes span,
.cell.hl-line .notes span,
.cell.hl-box  .notes span{color:#b8d8ff;opacity:.95;}

/* ── 숫자패드: 항상 한 줄, 보드와 동일 너비 ── */
#numpad{
  display:flex;gap:3px;flex-wrap:nowrap;
  width:calc(var(--board) + 4px);
  margin-bottom:8px;
}
.num-btn{
  flex:1;min-width:0;height:calc(var(--cell)*.9);
  background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);
  border-radius:8px;color:#f0e6d3;
  font-size:var(--font);font-family:'Noto Sans KR',sans-serif;font-weight:700;
  cursor:pointer;transition:all .2s;
  display:flex;align-items:center;justify-content:center;
  -webkit-tap-highlight-color:transparent;
}
.num-btn:hover:not(.done){background:rgba(200,169,110,.2);border-color:#c8a96e;color:#c8a96e;}
/* 완성된 숫자: 어둡게 + 취소선 */
.num-btn.done{
  background:rgba(255,255,255,.012)!important;
  border-color:rgba(255,255,255,.04)!important;
  color:rgba(255,255,255,.15)!important;
  cursor:default;text-decoration:line-through;
  text-decoration-color:rgba(255,255,255,.12);
}

/* ── 액션 버튼: 보드와 동일 너비 ── */
#actions{
  display:flex;gap:3px;flex-wrap:nowrap;
  width:calc(var(--board) + 4px);
}
.act-btn{
  flex:1;min-width:0;padding:8px 4px;border-radius:8px;
  border:1px solid rgba(255,255,255,.12);
  background:rgba(255,255,255,.05);color:#f0e6d3;
  font-family:'Noto Sans KR',sans-serif;
  font-size:clamp(10px,2.2vw,13px);font-weight:600;
  cursor:pointer;transition:all .2s;-webkit-tap-highlight-color:transparent;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.act-btn:hover{background:rgba(200,169,110,.15);border-color:#c8a96e;}
.act-btn.on{background:rgba(200,169,110,.18);border-color:#c8a96e;color:#c8a96e;}

/* ── 메모 전용 숫자패드 (한 줄) ── */
#memo-pad{
  display:none;
  flex-wrap:nowrap;
  gap:3px;
  width:calc(var(--board) + 4px);
  margin-bottom:8px;
}
#memo-pad.show{display:flex;}
.memo-btn{
  flex:1;min-width:0;
  height:calc(var(--cell) * 0.72);
  background:rgba(100,160,255,.08);
  border:1px solid rgba(100,160,255,.25);
  border-radius:8px;
  color:rgba(180,210,255,.85);
  font-size:calc(var(--font) * 0.82);
  font-family:'Noto Sans KR',sans-serif;font-weight:700;
  cursor:pointer;transition:all .15s;
  display:flex;align-items:center;justify-content:center;
  -webkit-tap-highlight-color:transparent;
}
.memo-btn:hover{background:rgba(100,160,255,.2);border-color:rgba(100,160,255,.5);color:#b4d2ff;}
.memo-btn.memo-on{
  background:rgba(100,160,255,.28);
  border-color:rgba(130,180,255,.7);
  color:#ddeeff;
}

/* ── 완성 오버레이 ── */
#win-overlay{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,.8);backdrop-filter:blur(12px);
  -webkit-backdrop-filter:blur(12px);
  align-items:center;justify-content:center;z-index:100;
}
#win-overlay.show{display:flex;animation:fadeIn .4s ease;}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
#win-card{
  background:#161622;border:1px solid rgba(200,169,110,.4);
  border-radius:22px;padding:40px 48px;text-align:center;
  box-shadow:0 0 80px rgba(200,169,110,.18);
}
#win-icon{font-size:48px;margin-bottom:10px;}
#win-title{
  font-size:26px;font-weight:900;color:#c8a96e;
  margin-bottom:8px;font-family:'Noto Sans KR',sans-serif;
}
#win-time{font-family:'IBM Plex Mono',monospace;color:rgba(255,255,255,.45);font-size:13px;margin-bottom:4px;}
#win-err{font-family:'IBM Plex Mono',monospace;font-size:13px;margin-bottom:24px;}
#win-again{
  padding:12px 32px;font-size:15px;
  background:#c8a96e;color:#0f0f14;border:none;
  border-radius:8px;font-family:'Noto Sans KR',sans-serif;font-weight:700;cursor:pointer;
}

/* ── 저장 토스트 ── */
#toast{
  position:fixed;bottom:28px;left:50%;
  transform:translateX(-50%) translateY(8px);
  background:rgba(22,22,34,.92);border:1px solid rgba(200,169,110,.35);
  border-radius:20px;padding:8px 20px;
  font-size:12px;font-weight:600;color:rgba(200,169,110,.9);
  font-family:'Noto Sans KR',sans-serif;
  backdrop-filter:blur(8px);pointer-events:none;z-index:200;
  opacity:0;transition:opacity .3s,transform .3s;
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* ── 기록 모달 ── */
#hist-overlay{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,.82);backdrop-filter:blur(14px);
  -webkit-backdrop-filter:blur(14px);
  align-items:center;justify-content:center;z-index:200;
}
#hist-overlay.show{display:flex;animation:fadeIn .35s ease;}
#hist-card{
  background:#161622;border:1px solid rgba(200,169,110,.35);
  border-radius:22px;padding:28px 24px;
  width:min(92vw,380px);max-height:88vh;overflow-y:auto;
  box-shadow:0 0 80px rgba(200,169,110,.15);position:relative;
}
#hist-card h2{
  font-family:'Noto Sans KR',sans-serif;font-size:18px;font-weight:900;
  color:#f0e6d3;text-align:center;margin-bottom:20px;
}
.hist-close{
  position:absolute;top:16px;right:18px;
  background:none;border:none;color:rgba(255,255,255,.4);
  font-size:22px;cursor:pointer;line-height:1;
}
.diff-sec{margin-bottom:20px;}
.diff-sec h3{
  font-family:'Noto Sans KR',sans-serif;font-size:13px;font-weight:700;color:#c8a96e;
  margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid rgba(200,169,110,.18);
}
.hrow{display:flex;justify-content:space-between;align-items:center;margin-bottom:7px;}
.hrow .hl{font-family:'Noto Sans KR',sans-serif;font-size:12px;color:rgba(255,255,255,.45);}
.hrow .hv{font-family:'IBM Plex Mono',monospace;font-size:13px;color:#f0e6d3;font-weight:600;}
.hrow .hv.good{color:#4ecb71;}.hrow .hv.bad{color:#e05c5c;}
.chart-wrap{margin-top:10px;}
.chart-lbl{font-family:'Noto Sans KR',sans-serif;font-size:11px;color:rgba(255,255,255,.35);margin-bottom:5px;}
.chart-bars{display:flex;align-items:flex-end;gap:3px;height:44px;}
.bar{flex:1;border-radius:3px 3px 0 0;min-height:3px;}
.bar.new{background:#c8a96e;}.bar.old{background:rgba(200,169,110,.3);}
.no-rec{
  font-family:'Noto Sans KR',sans-serif;font-size:12px;
  color:rgba(255,255,255,.25);text-align:center;padding:12px 0;
}
#hist-clear{
  display:block;margin:16px auto 0;padding:8px 22px;border-radius:20px;
  border:1px solid rgba(255,255,255,.12);background:none;
  color:rgba(255,255,255,.3);font-family:'Noto Sans KR',sans-serif;
  font-size:12px;cursor:pointer;transition:all .2s;
}
#hist-clear:hover{border-color:#e05c5c;color:#e05c5c;}
</style>
</head>
<body>

<div id="title-main">무한 스도쿠</div>
<div id="title-sub">INFINITE SUDOKU</div>

<div id="stats">
  <div class="stat">
    <div class="stat-val" id="s-time">00:00</div>
    <div class="stat-sub">시간</div>
  </div>
  <div class="stat-sep"></div>
  <div class="stat">
    <div class="stat-val" id="s-err">0</div>
    <div class="stat-sub">실수</div>
  </div>
  <div class="stat-sep"></div>
  <div class="stat">
    <div class="stat-val lbl" id="s-diff">보통</div>
    <div class="stat-sub">난이도</div>
  </div>
</div>

<div id="diff-row">
  <button class="diff-btn" data-d="easy">쉬움</button>
  <button class="diff-btn active" data-d="normal">보통</button>
  <button class="diff-btn" data-d="hard">어려움</button>
</div>

<div id="board"></div>
<div id="numpad"></div>

<div id="memo-pad"></div>
<div id="actions">
  <button class="act-btn" id="btn-note">✏️ 메모</button>
  <button class="act-btn" id="btn-undo">↩ 취소</button>
  <button class="act-btn" id="btn-erase">⌫ 지우기</button>
  <button class="act-btn" id="btn-new">🔄 새 게임</button>
  <button class="act-btn" id="btn-hist">📊 기록</button>

</div>

<div id="hist-overlay">
  <div id="hist-card">
    <button class="hist-close" id="hist-close">×</button>
    <h2>나의 기록</h2>
    <div id="hist-body"></div>
    <button id="hist-clear">기록 초기화</button>
  </div>
</div>

<!-- 저장 토스트 -->
<div id="toast">☁️ 진행 상황이 저장되었어요</div>

<script>
'use strict';

// ─────────────────────────────────────────────
//  유틸
// ─────────────────────────────────────────────
const $  = id => document.getElementById(id);
const QA = sel => document.querySelectorAll(sel);
const fmt = s  => String(Math.floor(s/60)).padStart(2,'0') + ':' + String(s%60).padStart(2,'0');

function shuffle(arr){
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}

// ─────────────────────────────────────────────
//  스도쿠 생성기
// ─────────────────────────────────────────────
function makeSolution(){
  const g=Array.from({length:9},()=>Array(9).fill(0));

  function valid(r,c,n){
    for(let i=0;i<9;i++) if(g[r][i]===n||g[i][c]===n) return false;
    const br=Math.floor(r/3)*3, bc=Math.floor(c/3)*3;
    for(let dr=0;dr<3;dr++) for(let dc=0;dc<3;dc++) if(g[br+dr][bc+dc]===n) return false;
    return true;
  }

  function solve(pos){
    if(pos===81) return true;
    const r=Math.floor(pos/9), c=pos%9;
    for(const n of shuffle([1,2,3,4,5,6,7,8,9])){
      if(valid(r,c,n)){ g[r][c]=n; if(solve(pos+1)) return true; g[r][c]=0; }
    }
    return false;
  }

  solve(0);
  return g;
}

function makePuzzle(sol, diff){
  // 쉬움: 32~36 제거, 보통: 46~50, 어려움: 52~56
  const n = diff==='easy'   ? 32+Math.floor(Math.random()*5)
          : diff==='normal' ? 46+Math.floor(Math.random()*5)
          :                   52+Math.floor(Math.random()*5);
  const p=sol.map(r=>[...r]);
  let removed=0;
  for(const pos of shuffle(Array.from({length:81},(_,i)=>i))){
    if(removed>=n) break;
    p[Math.floor(pos/9)][pos%9]=0;
    removed++;
  }
  return p;
}

// ─────────────────────────────────────────────
//  Web Audio 효과음
// ─────────────────────────────────────────────
let _actx=null;
function actx(){
  if(!_actx) _actx=new(window.AudioContext||window.webkitAudioContext)();
  if(_actx.state==='suspended') _actx.resume();
  return _actx;
}

function beep(freq,type,dur,vol=0.14,delay=0){
  const c=actx(), o=c.createOscillator(), g=c.createGain();
  o.connect(g); g.connect(c.destination);
  o.type=type;
  o.frequency.setValueAtTime(freq, c.currentTime+delay);
  g.gain.setValueAtTime(0,          c.currentTime+delay);
  g.gain.linearRampToValueAtTime(vol, c.currentTime+delay+0.01);
  g.gain.exponentialRampToValueAtTime(0.001, c.currentTime+delay+dur);
  o.start(c.currentTime+delay);
  o.stop(c.currentTime+delay+dur+0.05);
}

// 줄 완성음: 부드러운 2음 상승
function sfxLine(){ beep(523,'sine',.32,.13,0); beep(659,'sine',.32,.11,.11); }
// 박스 완성음: 따뜻한 3음 화음
function sfxBox() { beep(523,'sine',.45,.11,0); beep(659,'sine',.45,.11,.08); beep(784,'sine',.45,.13,.16); }
// 완성 팡파르
function sfxWin() { [523,659,784,1047].forEach((f,i)=>beep(f,'sine',.6,.14,i*.13)); }
// 오답 경고음: 낮고 둔탁한 2음
function sfxErr() { beep(180,'sawtooth',.18,.08,0); beep(150,'sawtooth',.14,.07,.09); }

// ─────────────────────────────────────────────
//  완성 체크
// ─────────────────────────────────────────────
function rowDone(b,e,r){ for(let c=0;c<9;c++) if(!b[r][c]||e.has(r+','+c)) return false; return true; }
function colDone(b,e,c){ for(let r=0;r<9;r++) if(!b[r][c]||e.has(r+','+c)) return false; return true; }
function boxDone(b,e,br,bc){
  for(let r=0;r<3;r++) for(let c=0;c<3;c++) if(!b[br+r][bc+c]||e.has((br+r)+','+(bc+c))) return false;
  return true;
}

// ─────────────────────────────────────────────
//  저장 / 불러오기 (localStorage)
// ─────────────────────────────────────────────
const SAVE_KEY='infinite-sudoku-save-v1';
const HIST_KEY='infinite-sudoku-hist-v1';

function serNotes(notes){
  const o={};
  for(const[k,v] of Object.entries(notes)) o[k]=[...v];
  return o;
}
function desNotes(raw){
  const o={};
  for(const[k,v] of Object.entries(raw)) o[k]=new Set(v);
  return o;
}

function gameSave(s){
  try{
    localStorage.setItem(SAVE_KEY, JSON.stringify({
      diff:s.diff, sol:s.sol, puz:s.puz, board:s.board,
      errors:[...s.errors], notes:serNotes(s.notes),
      noteMode:s.noteMode, done:s.done, timer:s.timer, mistakes:s.mistakes,
      doneRows:[...s.doneRows], doneCols:[...s.doneCols], doneBoxes:[...s.doneBoxes],
      at:Date.now()
    }));
    return true;
  }catch(e){ return false; }
}

function gameLoad(){
  try{
    const raw=localStorage.getItem(SAVE_KEY);
    if(!raw) return null;
    const d=JSON.parse(raw);
    if(Date.now()-d.at>86400000){ localStorage.removeItem(SAVE_KEY); return null; } // 24h 만료
    return d;
  }catch(e){ return null; }
}

function histLoad(){ try{ return JSON.parse(localStorage.getItem(HIST_KEY)||'[]'); }catch(e){ return []; } }
function histSave(h){ try{ localStorage.setItem(HIST_KEY,JSON.stringify(h)); }catch(e){} }
function histRecord(diff,time,mistakes){
  const h=histLoad();
  h.push({diff,time,mistakes,at:Date.now()});
  if(h.length>200) h.splice(0,h.length-200);
  histSave(h);
}

// ─────────────────────────────────────────────
//  게임 상태
// ─────────────────────────────────────────────
let S={
  diff:'normal', sol:null, puz:null, board:null,
  sel:null,          // {r,c}
  errors:new Set(),  // "r,c"
  notes:{},          // "r,c" -> Set
  noteMode:false,
  done:false,
  timer:0, mistakes:0,
  doneRows:new Set(), doneCols:new Set(), doneBoxes:new Set(),
  history:[]         // undo 스택: 직전 상태 1개만 보관
};
let _timer=null;

function timerStart(){
  if(_timer) clearInterval(_timer);
  _timer=setInterval(()=>{ S.timer++; $('s-time').textContent=fmt(S.timer); },1000);
}
function timerStop(){ if(_timer){ clearInterval(_timer); _timer=null; } }

// ─────────────────────────────────────────────
//  토스트
// ─────────────────────────────────────────────
let _toast=null;
function toast(msg){
  const el=$('toast'); el.textContent=msg; el.classList.add('show');
  if(_toast) clearTimeout(_toast);
  _toast=setTimeout(()=>el.classList.remove('show'),1800);
}

// ─────────────────────────────────────────────
//  새 게임
// ─────────────────────────────────────────────
function newGame(diff){
  diff=diff||S.diff;
  timerStop();
  try{ localStorage.removeItem(SAVE_KEY); }catch(e){}

  const sol=makeSolution();
  S={
    diff, sol, puz:makePuzzle(sol,diff),
    board:null, sel:null, errors:new Set(), notes:{}, noteMode:false,
    done:false, timer:0, mistakes:0,
    doneRows:new Set(), doneCols:new Set(), doneBoxes:new Set(),
    history:[]
  };
  S.board=S.puz.map(r=>[...r]);

  $('win-overlay').classList.remove('show');
  renderAll();
  timerStart();
}

// ─────────────────────────────────────────────
//  숫자 입력
// ─────────────────────────────────────────────
function inputNum(num){
  if(!S.sel||S.done) return;
  const {r,c}=S.sel;
  if(S.puz[r][c]!==0) return; // 주어진 숫자 보호

  // ── 현재 상태 스냅샷 저장 (undo용, 메모/숫자 입력 공통) ──
  S.history=[{
    r, c,
    prevVal: S.board[r][c],
    prevNote: S.notes[r+','+c] ? new Set(S.notes[r+','+c]) : null,
    prevErr: S.errors.has(r+','+c),
    prevMistakes: S.mistakes,
  }];

  // ── 메모 모드 ──
  if(S.noteMode){
    const k=r+','+c;
    if(!S.notes[k]) S.notes[k]=new Set();
    if(S.notes[k].has(num)) S.notes[k].delete(num); else S.notes[k].add(num);
    renderCell(r,c);
    renderMemoPad();
    return;
  }

  // ── 숫자 입력 ──
  S.board[r][c]=num;
  delete S.notes[r+','+c];

  if(S.sol[r][c]!==num){
    // 오답: 빨간 표시 + 경고음 + 흔들림
    S.errors.add(r+','+c);
    S.mistakes++;
    renderCell(r,c);
    renderStats();
    renderNumpad();
    sfxErr();
    setTimeout(()=>shakeCell(r,c), 0); // 렌더 후 실행
    return;
  }

  // 정답 처리
  S.errors.delete(r+','+c);

  // 같은 행·열·박스의 메모에서 해당 숫자 제거
  for(let i=0;i<9;i++){
    S.notes[r+','+i]?.delete(num);
    S.notes[i+','+c]?.delete(num);
  }
  const br=Math.floor(r/3)*3, bc=Math.floor(c/3)*3;
  for(let dr=0;dr<3;dr++) for(let dc=0;dc<3;dc++) S.notes[(br+dr)+','+(bc+dc)]?.delete(num);

  renderCell(r,c); renderStats(); renderNumpad(); renderHighlight();

  // ── 줄·박스 완성 감지 ──
  const fk=[];
  let lineDone=false, bxDone=false;

  if(!S.doneRows.has(r) && rowDone(S.board,S.errors,r)){
    S.doneRows.add(r);
    for(let i=0;i<9;i++) fk.push(r+','+i);
    lineDone=true;
  }
  if(!S.doneCols.has(c) && colDone(S.board,S.errors,c)){
    S.doneCols.add(c);
    for(let i=0;i<9;i++) fk.push(i+','+c);
    lineDone=true;
  }
  const bk=br+','+bc;
  if(!S.doneBoxes.has(bk) && boxDone(S.board,S.errors,br,bc)){
    S.doneBoxes.add(bk);
    for(let dr=0;dr<3;dr++) for(let dc=0;dc<3;dc++) fk.push((br+dr)+','+(bc+dc));
    bxDone=true;
  }

  // 완성 효과음 (줄·박스가 동시에 완성되면 약간 시차를 두어 레이어)
  if(lineDone) sfxLine();
  if(bxDone)   setTimeout(sfxBox, lineDone ? 160 : 0);

  // 줄·박스 완성 깜빡임
  if(fk.length) flashCells(fk);

  // ── 전체 완성 체크 ──
  if(S.board.every(row=>row.every(v=>v!==0)) && S.errors.size===0){
    S.done=true;
    timerStop();
    try{ localStorage.removeItem(SAVE_KEY); }catch(e){}
    histRecord(S.diff, S.timer, S.mistakes);
    setTimeout(()=>{
      $('win-time').textContent='TIME — '+fmt(S.timer);
      $('win-err').style.color=S.mistakes>0?'#e05c5c':'#c8a96e';
      $('win-err').textContent='MISTAKES — '+S.mistakes;
      $('win-overlay').classList.add('show');
      sfxWin();
    },300);
  }
}

// 실행 취소 (직전 입력 1회)
function undoLast(){
  if(S.done || !S.history.length) return;
  const h=S.history.pop();
  const {r,c,prevVal,prevNote,prevErr,prevMistakes}=h;

  // 값 복원
  S.board[r][c]=prevVal;

  // 오류 복원
  if(prevErr) S.errors.add(r+','+c);
  else        S.errors.delete(r+','+c);

  // 메모 복원
  if(prevNote) S.notes[r+','+c]=new Set(prevNote);
  else         delete S.notes[r+','+c];

  // 실수 카운트 복원
  S.mistakes=prevMistakes;

  // 선택 셀 복원
  S.sel={r,c};

  renderCell(r,c); renderStats(); renderNumpad(); renderHighlight();
}

// 지우기
function eraseCell(){
  if(!S.sel||S.done) return;
  const {r,c}=S.sel;
  if(S.puz[r][c]!==0) return;
  S.board[r][c]=0;
  S.errors.delete(r+','+c);
  delete S.notes[r+','+c];
  renderCell(r,c); renderStats(); renderNumpad();
}

// ─────────────────────────────────────────────
//  깜빡임 애니메이션
// ─────────────────────────────────────────────
// 오답 흔들림: Web Animations API (renderCell과 완전히 독립)
function shakeCell(r,c){
  try{
    const el=document.querySelector('[data-r="'+r+'"][data-c="'+c+'"]');
    if(!el) return;
    if(el._shakeAnim) el._shakeAnim.cancel();
    el._shakeAnim = el.animate([
      {transform:'translateX(0)',    offset:0},
      {transform:'translateX(-6px)', offset:0.15},
      {transform:'translateX(6px)',  offset:0.30},
      {transform:'translateX(-5px)', offset:0.45},
      {transform:'translateX(5px)',  offset:0.60},
      {transform:'translateX(-2px)', offset:0.78},
      {transform:'translateX(0)',    offset:1.0},
    ], {duration:420, easing:'ease-out', fill:'none'});
  }catch(e){}
}

function flashCells(keys){
  const unique=[...new Set(keys)];
  unique.forEach(k=>{
    const [r,c]=k.split(',').map(Number);
    const el=document.querySelector('[data-r="'+r+'"][data-c="'+c+'"]');
    if(!el) return;
    // 기존 애니메이션 취소
    if(el._flashRaf) cancelAnimationFrame(el._flashRaf);
    if(el._flashTimer) clearTimeout(el._flashTimer);

    const duration=900;   // ms
    const peak=0.5;       // 최대 불투명도
    let start=null;

    function step(ts){
      if(!start) start=ts;
      const p=Math.min((ts-start)/duration,1);
      // easing: 빠르게 올라갔다 부드럽게 내려옴
      const alpha = p<0.25
        ? (p/0.25)*peak
        : peak*(1-(p-0.25)/0.75);
      el.style.setProperty('background',
        'rgba(200,169,110,'+alpha.toFixed(3)+')', 'important');
      if(p<1){
        el._flashRaf=requestAnimationFrame(step);
      } else {
        el.style.removeProperty('background');
        el._flashRaf=null;
      }
    }
    el._flashRaf=requestAnimationFrame(step);
  });
}

// ─────────────────────────────────────────────
//  렌더링
// ─────────────────────────────────────────────
function getCellHL(r,c){
  if(!S.sel) return '';
  const {r:sr,c:sc}=S.sel;
  const sv=S.board[sr][sc], cv=S.board[r][c];
  if(r===sr && c===sc) return 'hl-sel';
  if(sv && sv!==0 && cv===sv) return 'hl-same';
  if(r===sr || c===sc) return 'hl-line';
  const br=Math.floor(r/3)*3, bc=Math.floor(c/3)*3;
  const sbr=Math.floor(sr/3)*3, sbc=Math.floor(sc/3)*3;
  if(br===sbr && bc===sbc) return 'hl-box';
  return '';
}

function renderCell(r,c){
  const el=document.querySelector(`[data-r="${r}"][data-c="${c}"]`);
  if(!el) return;

  const val=S.board[r][c];
  const isGiven=S.puz[r][c]!==0;
  const isErr=S.errors.has(r+','+c);
  const ns=S.notes[r+','+c];
  const hl=getCellHL(r,c);
  // br·bb만 보존
  const wasBR=el.classList.contains('br');
  const wasBB=el.classList.contains('bb');
  el.className='cell'
    +(wasBR?' br':'')
    +(wasBB?' bb':'');
  if(hl)      el.classList.add(hl);
  if(isGiven) el.classList.add('given');
  else if(isErr) el.classList.add('user-err');
  else if(val)   el.classList.add('user-ok');

  // 내용
  if(val===0 && ns && ns.size>0){
    let h='<div class="notes">';
    for(let n=1;n<=9;n++) h+=`<span>${ns.has(n)?n:''}</span>`;
    h+='</div>';
    el.innerHTML=h;
  } else {
    el.textContent=val||'';
  }
}

function renderHighlight(){
  for(let r=0;r<9;r++) for(let c=0;c<9;c++) renderCell(r,c);
  renderMemoPad();
}

function renderStats(){
  $('s-time').textContent=fmt(S.timer);
  const em=$('s-err');
  if(em){
    em.textContent=String(S.mistakes);
    em.classList.toggle('err',S.mistakes>0);
  }
  const sd=$('s-diff');
  if(sd) sd.textContent={easy:'쉬움',normal:'보통',hard:'어려움'}[S.diff]||'';
  QA('.diff-btn').forEach(b=>b.classList.toggle('active',b.dataset.d===S.diff));
}

function renderNumpad(){
  for(let n=1;n<=9;n++){
    let cnt=0;
    for(let r=0;r<9;r++)
      for(let c=0;c<9;c++)
        if(S.board[r][c]===n && !S.errors.has(r+','+c)) cnt++;
    const btn=document.querySelector('.num-btn[data-n="'+n+'"]');
    if(btn) btn.classList[cnt>=9?'add':'remove']('done');
  }
}

function buildBoard(){
  const wrap=$('board');
  wrap.innerHTML='';
  for(let r=0;r<9;r++) for(let c=0;c<9;c++){
    const el=document.createElement('div');
    el.className='cell';
    el.dataset.r=r; el.dataset.c=c;
    if((c+1)%3===0 && c!==8) el.classList.add('br'); // 3×3 우측 경계
    if((r+1)%3===0 && r!==8) el.classList.add('bb'); // 3×3 하단 경계
    el.addEventListener('click',()=>{
      if(S.done) return;
      S.sel={r,c};
      renderHighlight();
    });
    wrap.appendChild(el);
  }
  renderHighlight();
}

function buildNumpad(){
  const wrap=$('numpad');
  wrap.innerHTML='';
  for(let n=1;n<=9;n++){
    const btn=document.createElement('button');
    btn.className='num-btn';
    btn.dataset.n=n;
    btn.textContent=n;
    btn.addEventListener('click',()=>inputNum(n));
    wrap.appendChild(btn);
  }
}

function buildMemoPad(){
  const wrap=$('memo-pad');
  wrap.innerHTML='';
  for(let n=1;n<=9;n++){
    const btn=document.createElement('button');
    btn.className='memo-btn';
    btn.dataset.n=n;
    btn.textContent=n;
    btn.addEventListener('click',()=>inputNum(n));
    wrap.appendChild(btn);
  }
}

// 메모패드 버튼 활성 상태 업데이트 (선택 셀의 메모 반영)
function renderMemoPad(){
  if(!S.noteMode) return;
  const sel=S.sel;
  const ns=sel ? (S.notes[sel.r+','+sel.c]||new Set()) : new Set();
  $('memo-pad').querySelectorAll('.memo-btn').forEach(btn=>{
    btn.classList.toggle('memo-on', ns.has(+btn.dataset.n));
  });
}

function renderAll(){
  renderStats();
  buildBoard();
  buildNumpad();
  renderNumpad();
  buildMemoPad();
  // 메모 버튼 상태
  const nb=$('btn-note');
  nb.textContent='✏️ 메모';
  nb.classList.toggle('on',S.noteMode);
  $('memo-pad').classList.toggle('show',S.noteMode);
  renderMemoPad();
}

// ─────────────────────────────────────────────
//  기록 모달
// ─────────────────────────────────────────────
function renderHist(){
  const h=histLoad();
  const diffs=['easy','normal','hard'];
  const label={easy:'쉬움',normal:'보통',hard:'어려움'};
  let html='';

  diffs.forEach(d=>{
    const games=h.filter(g=>g.diff===d).sort((a,b)=>a.at-b.at);
    html+=`<div class="diff-sec"><h3>${label[d]}</h3>`;
    if(!games.length){ html+='<div class="no-rec">아직 기록이 없어요</div></div>'; return; }

    const times=games.map(g=>g.time);
    const best=Math.min(...times);
    const avg=Math.round(times.reduce((a,b)=>a+b,0)/times.length);

    html+=`<div class="hrow"><span class="hl">총 완료</span><span class="hv">${games.length}판</span></div>`;
    html+=`<div class="hrow"><span class="hl">최고 기록</span><span class="hv">${fmt(best)}</span></div>`;
    html+=`<div class="hrow"><span class="hl">평균 시간</span><span class="hv">${fmt(avg)}</span></div>`;

    // 최근 5판 추세
    if(games.length>=5){
      const r5=games.slice(-5).map(g=>g.time);
      const r5avg=Math.round(r5.reduce((a,b)=>a+b,0)/r5.length);
      const delta=r5avg-avg;
      const cls=delta<0?'good':'bad';
      const arrow=delta<0?'▼ ':'▲ ';
      const msg=delta<0?'빨라지는 중':'느려지는 중';
      html+=`<div class="hrow"><span class="hl">최근 5판 추세</span><span class="hv ${cls}">${arrow}${fmt(Math.abs(delta))} (${msg})</span></div>`;
    }

    // 최근 10판 막대그래프
    const chart=games.slice(-10);
    if(chart.length>=2){
      const mx=Math.max(...chart.map(g=>g.time));
      const mn=Math.min(...chart.map(g=>g.time));
      const rng=mx-mn||1;
      html+='<div class="chart-wrap"><div class="chart-lbl">최근 기록 추이 (낮을수록 빠름)</div><div class="chart-bars">';
      chart.forEach((g,i)=>{
        const pct=((g.time-mn)/rng*80+10).toFixed(1);
        const cls=i>=chart.length-3?'new':'old';
        html+=`<div class="bar ${cls}" style="height:${pct}%" title="${fmt(g.time)}"></div>`;
      });
      html+='</div></div>';
    }
    html+='</div>';
  });

  $('hist-body').innerHTML=html;
}

function openHist(){ renderHist(); $('hist-overlay').classList.add('show'); }
function closeHist(){ $('hist-overlay').classList.remove('show'); }

$('btn-note').addEventListener('click',()=>{

$('btn-undo').addEventListener('click',undoLast);

// 지우기
$('btn-erase').addEventListener('click',eraseCell);

  }

// 다시 풀기 (완성 팝업)
$('win-again').addEventListener('click',()=>newGame());

// 난이도 변경 → 새 게임
QA('.diff-btn').forEach(btn=>{
  btn.addEventListener('click',()=>newGame(btn.dataset.d));
});

// 앱 전환 시 자동 저장
document.addEventListener('visibilitychange',()=>{
  if(document.visibilityState==='hidden' && S.board && !S.done){
    if(gameSave(S)) toast('☁️ 진행 상황이 저장되었어요');
  }
});

// ─────────────────────────────────────────────
//  초기화: 저장된 게임 복원 or 새 게임
// ─────────────────────────────────────────────
(function init(){
  const saved=gameLoad();
  if(saved){
    S.diff=saved.diff; S.sol=saved.sol; S.puz=saved.puz; S.board=saved.board;
    S.errors=new Set(saved.errors); S.notes=desNotes(saved.notes);
    S.noteMode=saved.noteMode; S.done=saved.done;
    S.timer=saved.timer; S.mistakes=saved.mistakes;
    S.doneRows=new Set(saved.doneRows);
    S.doneCols=new Set(saved.doneCols);
    S.doneBoxes=new Set(saved.doneBoxes);
    S.sel=null;
    S.history=[];
    renderAll();
    if(!S.done) timerStart();
  } else {
    newGame();
  }
})();
</script>
